name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - os: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          target: ${{ matrix.target }}

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'CamForge-Next ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          tauriScript: pnpm tauri

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install frontend dependencies
        run: pnpm install

      - name: Copy Android icons to project
        run: |
          # 复制生成的图标到 Android 项目
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            cp src-tauri/icons/android/mipmap-$density/ic_launcher.png \
               src-tauri/gen/android/app/src/main/res/mipmap-$density/ic_launcher.png
            cp src-tauri/icons/android/mipmap-$density/ic_launcher_round.png \
               src-tauri/gen/android/app/src/main/res/mipmap-$density/ic_launcher_round.png
            cp src-tauri/icons/android/mipmap-$density/ic_launcher_foreground.png \
               src-tauri/gen/android/app/src/main/res/mipmap-$density/ic_launcher_foreground.png
          done

      - name: Decode keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 -d > camforge-next.keystore

      - name: Build Android APK
        run: pnpm tauri android build
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Sign APK
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 签名 APK
          cd src-tauri/gen/android/app/build/outputs/apk/universal/release
          $ANDROID_HOME/build-tools/36.1.0/apksigner sign \
            --ks ../../../../../../../../../camforge-next.keystore \
            --ks-pass pass:$ANDROID_KEYSTORE_PASSWORD \
            --ks-key-alias $ANDROID_KEY_ALIAS \
            --key-pass pass:$ANDROID_KEY_PASSWORD \
            --out CamForge-Next_signed.apk \
            app-universal-release-unsigned.apk

      - name: Rename and upload APK
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # 获取版本号
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}

          cd src-tauri/gen/android/app/build/outputs/apk/universal/release

          # 判断是否已签名
          if [ -f CamForge-Next_signed.apk ]; then
            mv CamForge-Next_signed.apk CamForge-Next_${VERSION}_android-universal.apk
            echo "APK_PATH=$(pwd)/CamForge-Next_${VERSION}_android-universal.apk" >> $GITHUB_ENV
            echo "APK_STATUS=signed" >> $GITHUB_ENV
          else
            mv app-universal-release-unsigned.apk CamForge-Next_${VERSION}_android-universal-unsigned.apk
            echo "APK_PATH=$(pwd)/CamForge-Next_${VERSION}_android-universal-unsigned.apk" >> $GITHUB_ENV
            echo "APK_STATUS=unsigned" >> $GITHUB_ENV
          fi

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK_PATH }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.APK_PATH }}
          draft: true

  build-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install

      - name: Initialize iOS project
        run: pnpm tauri ios init

      - name: Copy iOS icons to project
        run: |
          # 复制生成的 iOS 图标到项目
          cp src-tauri/icons/ios/*.png src-tauri/gen/apple/CamForge-Next/Images.xcassets/AppIcon.appiconset/ 2>/dev/null || true

      - name: Build iOS (simulator)
        run: pnpm tauri ios build --target aarch64-sim

      - name: Create and rename IPA
        run: |
          # 获取版本号
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}

          # 创建 IPA
          cd src-tauri/gen/apple/build/arm64-sim
          mkdir -p Payload
          mv CamForge-Next.app Payload/
          zip -r CamForge-Next_${VERSION}_ios-arm64-sim.ipa Payload

          # 输出文件路径
          echo "IPA_PATH=$(pwd)/CamForge-Next_${VERSION}_ios-arm64-sim.ipa" >> $GITHUB_ENV

      - name: Upload IPA to Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.IPA_PATH }}
          draft: true