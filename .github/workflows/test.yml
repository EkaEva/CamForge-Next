name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test:run

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: ESLint check
        run: pnpm lint

      - name: pnpm audit
        run: pnpm audit --audit-level=moderate || true

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run Rust tests
        run: cargo test -p camforge-core -p camforge-server

      - name: Rust clippy check
        run: cargo clippy -p camforge-core -p camforge-server -- -D warnings

      - name: cargo audit
        run: cargo install cargo-audit --locked && cargo audit

  build-check:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build
